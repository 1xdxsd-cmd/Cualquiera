apply plugin: 'com.android.application'

android {
    namespace 'com.streamingthalia.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.streamingthalia.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
